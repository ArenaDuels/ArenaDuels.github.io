<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArenaDuels</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- ===================== MAIN MENU ===================== -->
  <div id="screen-menu" class="screen">
    <div class="menu-panel">
      <button id="btn-settings" class="settings-btn" title="Settings" aria-label="Settings">⚙</button>
      <h1 class="logo">ARENA<span>DUELS</span></h1>
      <p class="tagline">Pick an arena. Host or drop in.</p>

      <div class="name-row">
        <input id="player-name-input" class="name-input" maxlength="16" placeholder="Your name">
        <button id="btn-random-name" class="dice-btn" title="Random name" aria-label="Random name">🎲</button>
      </div>

      <div id="arena-grid" class="arena-grid"></div>

      <div class="visibility-toggle" id="visibility-toggle">
        <button class="visibility-option selected" data-public="false">Private (code)</button>
        <button class="visibility-option" data-public="true">Public (listed)</button>
      </div>

      <div class="menu-actions">
        <button id="btn-host" class="btn btn-primary">Host Match</button>
        <button id="btn-join" class="btn btn-secondary">Join Match</button>
      </div>
      <button id="btn-browse" class="btn btn-secondary browse-btn">Browse Public Lobbies</button>
    </div>
  </div>

  <!-- ===================== PAUSE MENU ===================== -->
  <div id="pause-menu" class="modal-overlay hidden">
    <div class="modal-panel pause-panel">
      <p class="eyebrow">Paused</p>
      <button id="btn-resume" class="btn btn-primary">Resume</button>
      <button id="btn-pause-settings" class="btn btn-secondary">Settings</button>
      <button id="btn-leave-match" class="btn btn-leave">Leave Match</button>
    </div>
  </div>

  <!-- ===================== PAUSE MENU ===================== -->
  <div id="pause-menu" class="modal-overlay hidden">
    <div class="modal-panel pause-panel">
      <p class="eyebrow">Paused</p>
      <div class="menu-actions pause-actions">
        <button id="btn-resume" class="btn btn-primary">Resume</button>
        <button id="btn-pause-settings" class="btn btn-secondary">Settings</button>
        <button id="btn-leave-match" class="btn btn-danger">Leave Match</button>
      </div>
    </div>
  </div>

  <!-- ===================== SETTINGS MODAL ===================== -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-panel">
      <p class="eyebrow">Settings</p>

      <div class="setting-row">
        <div class="setting-label">
          <span>Sensitivity</span>
          <span id="sens-value" class="setting-value">6.0</span>
        </div>
        <input id="sens-slider" type="range" min="1" max="20" step="0.1" value="6" class="slider">
      </div>

      <div class="setting-row">
        <div class="setting-label">
          <span>Field of View</span>
          <span id="fov-value" class="setting-value">90</span>
        </div>
        <input id="fov-slider" type="range" min="60" max="110" step="1" value="90" class="slider">
      </div>

      <div class="setting-row">
        <div class="setting-label">
          <span>Crosshair Size</span>
          <span id="crosshair-value" class="setting-value">6</span>
        </div>
        <input id="crosshair-slider" type="range" min="2" max="16" step="1" value="6" class="slider">
      </div>

      <button id="btn-settings-close" class="btn btn-primary">Done</button>
    </div>
  </div>

  <!-- ===================== HOST WAIT ===================== -->
  <div id="screen-host-wait" class="screen hidden">
    <div class="menu-panel">
      <p class="eyebrow">Share this code</p>
      <div id="host-code-display" class="code-pills">------</div>
      <p id="host-status" class="status-text">Getting a code...</p>
      <div class="menu-actions">
        <button id="btn-retry-host" class="btn btn-primary hidden">Retry</button>
        <button id="btn-cancel-host" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===================== JOIN ===================== -->
  <div id="screen-joining" class="screen hidden">
    <div class="menu-panel">
      <p class="eyebrow">Enter code</p>
      <input id="join-code-input" class="code-input" maxlength="6" inputmode="numeric" placeholder="000000">
      <p id="join-status" class="status-text"></p>
      <div class="menu-actions">
        <button id="btn-join-confirm" class="btn btn-primary">Connect</button>
        <button id="btn-cancel-join" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===================== BROWSE PUBLIC LOBBIES ===================== -->
  <div id="screen-browse" class="screen hidden">
    <div class="menu-panel">
      <p class="eyebrow">Public Lobbies</p>
      <div id="lobby-list" class="lobby-list">
        <p class="status-text">Loading...</p>
      </div>
      <button id="btn-cancel-browse" class="btn btn-secondary">Back</button>
    </div>
  </div>

  <!-- ===================== GAME ===================== -->
  <canvas id="game-canvas" class="hidden"></canvas>
  <div id="crosshair" class="hidden"></div>
  <div id="hud" class="hidden">
    <div id="hud-score">Kills 0 · Deaths 0</div>
  </div>
  <div id="hud-hp-corner" class="hidden">
    <span id="hud-hp-label">HP</span>
    <span id="hud-hp-value">100</span>
  </div>
  <div id="room-code-banner" class="hidden">
    <span class="room-code-label">Room Code</span>
    <span id="room-code-value">------</span>
    <span class="room-code-hint">waiting for players to join...</span>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
